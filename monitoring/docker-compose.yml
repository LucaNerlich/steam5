# Steam5 monitoring stack: Prometheus + Grafana.
#
# Sidecar configs are bind-mounted from `./prometheus/` and
# `./grafana/provisioning/datasources/`. The Prometheus datasource is
# auto-provisioned (UID `prometheus`); dashboards are NOT auto-provisioned.
#
# Import dashboards manually once after first boot via the Grafana UI:
#   Dashboards → New → Import → paste JSON from
#   `./grafana/dashboards-json/*.json` → select the Prometheus datasource
#   → Import. They persist in the `/var/lib/grafana` host volume.
#
# Coolify deploys: use Git-based source with Base Directory `/monitoring`
# so sibling files ship alongside this compose file.
#
# Local quickstart: cp .env.example .env && docker compose --env-file .env up -d

services:
  prometheus:
    image: prom/prometheus:v3.5.3
    pull_policy: always
    container_name: steam5-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    environment:
      # Consumed by /usr/local/bin/entrypoint.sh to render prometheus.yml.tpl
      # at container start. Prometheus itself does not expand ${VAR} in its
      # config (only --enable-feature=expand-external-labels covers
      # external_labels), so we template the file before launching.
      PROMETHEUS_SCRAPE_INTERVAL: ${PROMETHEUS_SCRAPE_INTERVAL:-15s}
      STEAM5_METRICS_TARGET: ${STEAM5_METRICS_TARGET:-host.docker.internal:8081}
      STEAM5_METRICS_SCHEME: ${STEAM5_METRICS_SCHEME:-http}
      STEAM5_METRICS_PATH: ${STEAM5_METRICS_PATH:-/actuator/prometheus}
      STEAM5_METRICS_USERNAME: ${STEAM5_METRICS_USERNAME:-metrics}
      STEAM5_METRICS_PASSWORD: ${STEAM5_METRICS_PASSWORD:-metrics}
    volumes:
      - ./prometheus/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ./prometheus/prometheus.yml.tpl:/etc/prometheus/prometheus.yml.tpl:ro
      - /data/volumes/steam5/prometheus:/prometheus
    extra_hosts:
      # No-op on macOS Docker Desktop (where host.docker.internal already
      # resolves), required on Linux Docker Engine 20.10+ to reach the host.
      - "host.docker.internal:host-gateway"
    entrypoint: ["/bin/sh", "/usr/local/bin/entrypoint.sh"]
    command:
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - default
      - coolify

  grafana:
    image: grafana/grafana:13.0.1-security-01-ubuntu
    pull_policy: always
    container_name: steam5-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-http://localhost:${GRAFANA_PORT:-3001}}
      GF_SERVER_DOMAIN: ${GF_SERVER_DOMAIN:-localhost}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP:-false}
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - /data/volumes/steam5/grafana:/var/lib/grafana
    networks:
      - default
      - coolify

networks:
  default:
    name: steam5-monitoring
  coolify:
    external: true
    name: coolify
